<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 1 Members</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* 🌈 BACKGROUND */
body {
  background: linear-gradient(-45deg, #0f2027, #203a43, #000000, #00c6ff);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  color: white;
  text-align: center;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* TITLE */
h1 {
  margin-top: 40px;
  font-size: 40px;
  text-shadow: 0 0 15px cyan;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
  margin-top: 60px;
}

/* CARD */
.card {
  width: 220px;
  height: 300px;
  border-radius: 20px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 25px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 35px cyan;
}

/* IMAGE */
.card img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid cyan;
}

/* NAME */
.name {
  margin-top: 20px;
  font-weight: bold;
  color: cyan;
}

/* 🔵 RIPPLE */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(0,255,255,0.4);
  animation: rippleAnim 0.5s linear;
  pointer-events: none;
}

@keyframes rippleAnim {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* FADE */
.fade-out {
  animation: fadeOut 0.4s ease forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(1.05);
  }
}

/* BUTTON */
.back-btn {
  margin-top: 50px;
  display: inline-block;
  padding: 12px 30px;
  border-radius: 25px;
  background: cyan;
  color: black;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>GROUP 1 MEMBERS</h1>

<div class="container">

  <div class="card"
       onmouseenter="playSound('edelyn.mp3')"
       onmouseleave="stopSound()"
       onclick="handleClick(event,'edelynchochesa.html','edelyn.mp3')">
    <img src="edelyn.jpg">
    <div class="name">Edelyn</div>
  </div>

  <div class="card"
       onmouseenter="playSound('jamaica.mp3')"
       onmouseleave="stopSound()"
       onclick="handleClick(event,'jamaicasinangote.html','jamaica.mp3')">
    <img src="jamaica.jpg">
    <div class="name">Jamaica</div>
  </div>

  <div class="card"
       onmouseenter="playSound('jomari.mp3')"
       onmouseleave="stopSound()"
       onclick="handleClick(event,'jomarisingzon.html','jomari.mp3')">
    <img src="jomari.jpg">
    <div class="name">Jomari</div>
  </div>

  <div class="card"
       onmouseenter="playSound('renalyn.mp3')"
       onmouseleave="stopSound()"
       onclick="handleClick(event,'renalynjabuen.html','renalyn.mp3')">
    <img src="renalyn.jpg">
    <div class="name">Renalyn</div>
  </div>

  <div class="card"
       onmouseenter="playSound('rica.mp3')"
       onmouseleave="stopSound()"
       onclick="handleClick(event,'ricacautiver.html','rica.mp3')">
    <img src="rica.jpg">
    <div class="name">Rica</div>
  </div>

</div>

<a href="index.html" class="back-btn">← Back</a>

<script>
let currentSound = null;

// 🔊 HOVER SOUND (desktop)
function playSound(file) {
  if (currentSound) {
    currentSound.pause();
    currentSound.currentTime = 0;
  }
  currentSound = new Audio(file);
  currentSound.play().catch(()=>{});
}

function stopSound() {
  if (currentSound) {
    currentSound.pause();
    currentSound.currentTime = 0;
  }
}

// 🔵 CLICK SYSTEM (ripple + sound + smooth redirect)
function handleClick(e, link, soundFile) {

  stopSound();

  let sound = new Audio(soundFile);
  sound.play().catch(()=>{});

  // ripple
  let circle = document.createElement("span");
  circle.classList.add("ripple");

  let rect = e.currentTarget.getBoundingClientRect();
  circle.style.left = e.clientX - rect.left + "px";
  circle.style.top = e.clientY - rect.top + "px";

  e.currentTarget.appendChild(circle);

  setTimeout(() => {
    circle.remove();
  }, 500);

  // stop bg animation (fix flash)
  document.body.style.animation = "none";

  setTimeout(() => {
    document.body.classList.add("fade-out");
    window.location.href = link;
  }, 350);
}
</script>

</body>
</html>
