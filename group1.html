<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Team</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* HERO VIDEO SECTION */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.bg-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay-dark {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-text {
  position: relative;
  z-index: 1;
  text-align: center;
  top: 40%;
  color: white;
}

.hero-text h1 {
  font-size: 50px;
  background: linear-gradient(45deg, cyan, magenta);
  -webkit-background-clip: text;
  color: transparent;
}

.hero-text p {
  margin-top: 10px;
  color: #ccc;
}

/* TEAM SECTION */
.team {
  background: #0a0f1c;
  padding: 60px 20px;
  text-align: center;
}

.team h2 {
  font-size: 35px;
  margin-bottom: 40px;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
}

/* CARD */
.card {
  width: 250px;
  height: 320px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: 0.4s;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 20px;
  opacity: 0;
  transition: 0.4s;
}

.card:hover .overlay {
  opacity: 1;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.card:hover {
  transform: scale(1.05);
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 25px;
  background: linear-gradient(45deg, cyan, magenta);
  color: white;
  text-decoration: none;
  display: inline-block;
}

/* RESPONSIVE */
@media(max-width: 768px){
  .hero-text h1 {
    font-size: 30px;
  }
}

</style>
</head>

<body>

<!-- HERO VIDEO -->
<div class="hero">

  <video autoplay muted loop class="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="overlay-dark"></div>

  <div class="hero-text">
    <h1>Welcome to Our Team</h1>
    <p>Creative minds. Strong future.</p>
    <a href="#team" class="btn">Meet Us</a>
  </div>

</div>

<!-- TEAM SECTION -->
<div class="team" id="team">

  <h2>Our Members</h2>

  <div class="container">

    <div class="card">
      <img src="edelyn.jpg">
      <div class="overlay"><div class="name">Edelyn</div></div>
    </div>

    <div class="card">
      <img src="jamaica.jpg">
      <div class="overlay"><div class="name">Jamaica</div></div>
    </div>

    <div class="card">
      <img src="jomari.jpg">
      <div class="overlay"><div class="name">Jomari</div></div>
    </div>

    <a href="renalynjabuen.html">
      <div class="card">
        <img src="renalyn.jpg">
        <div class="overlay"><div class="name">Renalyn</div></div>
      </div>
    </a>

    <div class="card">
      <img src="rica.jpg">
      <div class="overlay"><div class="name">Rica</div></div>
    </div>

  </div>

</div>

</body>
</html>
